<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>adaptive-rate-limit · live demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Syne', 'sans-serif'],
            mono: ['"IBM Plex Mono"', 'monospace'],
          },
          colors: {
            cream: '#F7F5F0',
            'cream-border': '#E8E5DC',
            'cream-muted': '#F0EDE6',
            ink: '#1C1C1A',
            brand: '#FF4D00',
          },
          keyframes: {
            pulseDot: { '0%,100%': { opacity: '1' }, '50%': { opacity: '0.35' } },
            fadeSlide: { from: { opacity: '0', transform: 'translateY(-3px)' }, to: { opacity: '1', transform: 'none' } },
          },
          animation: {
            pulseDot: 'pulseDot 1.5s ease-in-out infinite',
            fadeSlide: 'fadeSlide 0.2s ease',
          },
        },
      },
    }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
</head>
<body class="bg-cream text-ink font-mono min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React

const BASE_LIMIT = 20

// ── useLoadStatus ──────────────────────────────────────────────────────────
function useLoadStatus(pollMs = 2000) {
  const [s, setS] = useState({ factor: 1, cpuPercent: 0, effectiveLimit: BASE_LIMIT, enabled: false })
  useEffect(() => {
    let alive = true
    const poll = async () => {
      try {
        const res = await fetch('/api/status')
        if (!res.ok || !alive) return
        const d = await res.json()
        if (alive) setS({
          factor: d.currentFactor ?? 1,
          cpuPercent: d.cpuPercent ?? 0,
          effectiveLimit: Math.floor(BASE_LIMIT * (d.currentFactor ?? 1)),
          enabled: d.enabled ?? false,
        })
      } catch {}
    }
    poll()
    const id = setInterval(poll, pollMs)
    return () => { alive = false; clearInterval(id) }
  }, [pollMs])
  return s
}

// ── useEndpoint ────────────────────────────────────────────────────────────
function useEndpoint(path) {
  const [state, setState] = useState({ httpStatus: null, remaining: null, limit: null, resetAt: null, log: [], sending: false })
  const [countdown, setCountdown] = useState(null)
  const timerRef = useRef(null)

  const startCountdown = useCallback((resetAt) => {
    if (timerRef.current) clearInterval(timerRef.current)
    const tick = () => {
      const secs = Math.max(0, Math.ceil((resetAt - Date.now()) / 1000))
      setCountdown(secs)
      if (secs <= 0) { clearInterval(timerRef.current); timerRef.current = null; setCountdown(null) }
    }
    tick()
    timerRef.current = setInterval(tick, 500)
  }, [])

  useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current) }, [])

  const send = useCallback(async () => {
    setState(s => ({ ...s, sending: true }))
    const ts = Date.now()
    try {
      const res = await fetch(path)
      const httpStatus = res.status
      const limit     = parseInt(res.headers.get('ratelimit-limit'))    || null
      const remaining = parseInt(res.headers.get('ratelimit-remaining'))
      const resetAt   = parseInt(res.headers.get('ratelimit-reset'))    || null
      setState(s => ({
        ...s, sending: false, httpStatus,
        remaining: isNaN(remaining) ? null : remaining,
        limit, resetAt,
        log: [{ status: httpStatus, ts }, ...s.log].slice(0, 5),
      }))
      if (httpStatus === 429 && resetAt) startCountdown(resetAt)
    } catch {
      setState(s => ({ ...s, sending: false }))
    }
  }, [path, startCountdown])

  const blocked = state.httpStatus === 429 && countdown !== null && countdown > 0
  return { ...state, send, blocked, countdown }
}

// ── RelTime ────────────────────────────────────────────────────────────────
function RelTime({ ts }) {
  const [, tick] = useState(0)
  useEffect(() => { const id = setInterval(() => tick(t => t + 1), 5000); return () => clearInterval(id) }, [])
  const s = Math.floor((Date.now() - ts) / 1000)
  return <span className="text-slate-400">{s < 5 ? 'just now' : s < 60 ? `${s}s ago` : `${Math.floor(s/60)}m ago`}</span>
}

// ── QuotaBar ──────────────────────────────────────────────────────────────
function QuotaBar({ remaining, limit }) {
  const empty = remaining === null
  const pct   = empty ? 100 : Math.max(0, Math.min(100, (remaining / limit) * 100))
  const fill  = empty ? 'bg-cream-border' : pct > 50 ? 'bg-emerald-400' : pct > 20 ? 'bg-amber-400' : 'bg-red-400'
  return (
    <div>
      <div className="h-1.5 bg-cream-muted rounded-full overflow-hidden">
        <div className={`h-full rounded-full transition-all duration-300 ${fill}`} style={{ width: `${pct}%` }} />
      </div>
      <div className="flex justify-between mt-1.5 text-xs text-slate-400">
        <span>{remaining !== null ? remaining : '—'} remaining</span>
        <span>/ {limit ?? '—'}</span>
      </div>
    </div>
  )
}

// ── EndpointCard ──────────────────────────────────────────────────────────
function EndpointCard({ path, cost, description }) {
  const { httpStatus, remaining, limit, send, sending, blocked, countdown, log } = useEndpoint(path)

  const pct = remaining !== null && limit ? (remaining / limit) * 100 : 100
  const accentBg = blocked
    ? 'bg-red-400'
    : remaining === null ? 'bg-cream-border'
    : pct > 50 ? 'bg-emerald-400'
    : pct > 20 ? 'bg-amber-400'
    : 'bg-red-400'

  let btnClasses = 'w-full py-2.5 rounded-lg text-xs font-sans font-bold uppercase tracking-widest transition-all duration-150 '
  if (sending)       btnClasses += 'bg-cream-muted text-ink cursor-wait'
  else if (blocked)  btnClasses += 'bg-red-50 text-red-700 cursor-not-allowed'
  else               btnClasses += 'bg-ink text-cream hover:bg-brand hover:-translate-y-px hover:shadow-lg active:translate-y-0 active:shadow-none'

  return (
    <div className="bg-white border border-cream-border rounded-xl overflow-hidden flex flex-col shadow-sm hover:shadow-md transition-shadow duration-200">
      {/* Accent stripe */}
      <div className={`h-0.5 ${accentBg} transition-colors duration-500`} />

      {/* Header */}
      <div className="px-5 pt-5 pb-0">
        <div className="flex justify-between items-start mb-1">
          <div>
            <div className="font-sans font-bold text-xs text-slate-400 tracking-widest uppercase mb-1">GET</div>
            <div className="font-mono font-medium text-base text-ink">{path}</div>
          </div>
          <div className="flex flex-col items-end gap-1.5 pt-0.5">
            <span className="font-sans font-bold text-xs tracking-wider px-2 py-0.5 rounded-md bg-cream border border-cream-border text-slate-500">
              ×{cost}
            </span>
            {httpStatus && (
              <span className={`text-xs font-medium px-2 py-0.5 rounded-full ${httpStatus === 200 ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}`}>
                {httpStatus}
              </span>
            )}
          </div>
        </div>
        <p className="text-xs text-slate-400 italic mb-4">{description}</p>
      </div>

      {/* Quota bar */}
      <div className="px-5 mb-4">
        <QuotaBar remaining={remaining} limit={limit} />
      </div>

      {/* Button */}
      <div className="px-5 mb-4">
        <button className={btnClasses} onClick={send} disabled={blocked || sending}>
          {sending ? '···' : blocked ? `reset in ${countdown}s` : 'Send Request'}
        </button>
      </div>

      {/* Blocked notice */}
      {blocked && (
        <div className="px-5 mb-4">
          <div className="flex items-center gap-2 bg-red-50 border border-red-100 rounded-lg px-3 py-2.5 text-xs text-red-700 font-medium">
            <span>⊘</span>
            <span>Rate limited — resets in {countdown}s</span>
          </div>
        </div>
      )}

      {/* Request log */}
      <div className="px-5 pt-3.5 pb-5 border-t border-cream-muted mt-auto">
        <div className="font-sans font-bold text-xs tracking-widest uppercase text-slate-300 mb-2">Request log</div>
        {log.length === 0
          ? <p className="text-xs text-slate-300 italic">No requests yet</p>
          : log.map((e, i) => (
            <div key={i} className="flex items-center gap-2 text-xs py-0.5 animate-fadeSlide">
              <span className={`inline-block w-1.5 h-1.5 rounded-full flex-shrink-0 ${e.status === 200 ? 'bg-emerald-400' : 'bg-red-400'}`} />
              <span className={`font-medium w-7 ${e.status === 200 ? 'text-emerald-600' : 'text-red-600'}`}>{e.status}</span>
              <RelTime ts={e.ts} />
            </div>
          ))
        }
      </div>
    </div>
  )
}

// ── StatusBar ─────────────────────────────────────────────────────────────
function StatusBar() {
  const { factor, cpuPercent, effectiveLimit, enabled } = useLoadStatus()
  const factorColor = factor >= 0.8 ? 'text-emerald-400' : factor >= 0.5 ? 'text-amber-400' : 'text-red-400'
  const cpu = Math.round(cpuPercent)
  const cpuFill = cpu < 60 ? 'bg-emerald-400' : cpu < 80 ? 'bg-amber-400' : 'bg-red-400'

  return (
    <div className="bg-ink text-cream px-7 py-3">
      <div className="max-w-5xl mx-auto flex items-center gap-7 flex-wrap">

        {/* Brand */}
        <div className="flex-1 min-w-40">
          <div className="flex items-center gap-2">
            <div className="font-sans font-extrabold text-lg tracking-tight">adaptive-rate-limit</div>
            <a
              href="https://github.com/dwalkerwd7/adaptive-rate-limit"
              target="_blank"
              rel="noopener noreferrer"
              className="text-white/30 hover:text-white/70 transition-colors"
              title="View source on GitHub"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
              </svg>
            </a>
          </div>
          <div className="text-xs text-white/30 mt-0.5 font-mono">window 10s · base limit 20 · ip identifier</div>
        </div>

        {/* Load factor */}
        <div className="text-center">
          <div className="font-sans font-bold text-xs tracking-widest uppercase text-white/30 mb-1">Load factor</div>
          <div className={`font-sans font-extrabold text-3xl leading-none tracking-tight transition-colors duration-500 ${factorColor}`}>
            {factor.toFixed(2)}×
          </div>
        </div>

        <div className="w-px h-10 bg-white/10" />

        {/* CPU */}
        <div>
          <div className="font-sans font-bold text-xs tracking-widest uppercase text-white/30 mb-1.5">CPU</div>
          <div className="flex items-center gap-2">
            <div className="w-28 h-1 bg-white/10 rounded-full overflow-hidden">
              <div className={`h-full rounded-full transition-all duration-500 ${cpuFill}`} style={{ width: `${cpu}%` }} />
            </div>
            <span className="text-sm text-white/60 font-mono w-8">{cpu}%</span>
          </div>
        </div>

        <div className="w-px h-10 bg-white/10" />

        {/* Effective limit */}
        <div className="text-center">
          <div className="font-sans font-bold text-xs tracking-widest uppercase text-white/30 mb-1">Eff. limit</div>
          <div className="flex items-baseline gap-1">
            <span className="font-sans font-extrabold text-2xl leading-none text-white">{effectiveLimit}</span>
            <span className="text-sm text-white/30 font-mono">/20</span>
          </div>
        </div>

        <div className="w-px h-10 bg-white/10" />

        {/* Adaptive badge */}
        <div>
          <div className="font-sans font-bold text-xs tracking-widest uppercase text-white/30 mb-1.5">Adaptive</div>
          <div className={`inline-flex items-center gap-1.5 text-xs font-sans font-bold tracking-widest uppercase px-2.5 py-1 rounded ${enabled ? 'bg-emerald-400/10 text-emerald-400 border border-emerald-400/20' : 'bg-white/5 text-white/25 border border-white/10'}`}>
            <span className={`w-1.5 h-1.5 rounded-full ${enabled ? 'bg-emerald-400 animate-pulseDot' : 'bg-white/20'}`} />
            {enabled ? 'ACTIVE' : 'OFF'}
          </div>
        </div>

      </div>
    </div>
  )
}

// ── App ───────────────────────────────────────────────────────────────────
const ENDPOINTS = [
  { path: '/api/ping',   cost: 1,  description: 'Lightweight — returns immediately' },
  { path: '/api/search', cost: 5,  description: 'Medium — simulates a DB query' },
  { path: '/api/crunch', cost: 10, description: 'CPU-heavy — prime sieve to 50 000' },
]

function App() {
  return (
    <div className="min-h-screen flex flex-col">
      <StatusBar />
      <main className="flex-1 max-w-5xl mx-auto w-full px-7 py-7">
        <p className="text-xs text-slate-400 leading-relaxed mb-6">
          All requests share a single 10s window (limit&nbsp;20). Higher-cost endpoints burn through quota faster.{' '}
          Spam <span className="text-ink font-medium">/api/crunch</span> to spike CPU and watch the load factor drop — the effective limit shrinks in real time.
        </p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
          {ENDPOINTS.map(e => <EndpointCard key={e.path} {...e} />)}
        </div>
      </main>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
