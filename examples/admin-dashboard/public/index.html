<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rate Limit Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    [data-sort]:hover { cursor: pointer; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React

// ─── hook: useAdminData ────────────────────────────────────────────────────
function useAdminData(token, pollMs = 5000) {
  const [identifiers, setIdentifiers] = useState([])
  const [load, setLoad] = useState(null)
  const [error, setError] = useState(null)
  const [loading, setLoading] = useState(true)
  const tokenRef = useRef(token)
  tokenRef.current = token

  const headers = useCallback(() => ({
    Authorization: `Bearer ${tokenRef.current}`
  }), [])

  const fetchAll = useCallback(async () => {
    try {
      const [idRes, loadRes] = await Promise.all([
        fetch('/admin/identifiers', { headers: headers() }),
        fetch('/admin/load', { headers: headers() })
      ])

      if (idRes.status === 401 || loadRes.status === 401) {
        setError('Invalid token — copy the "Auth token:" value printed in the server terminal and paste it into the Connect box above')
        return
      }

      const [idData, loadData] = await Promise.all([idRes.json(), loadRes.json()])
      setIdentifiers(idData.identifiers ?? [])
      setLoad(loadData)
      setError(null)
    } catch (e) {
      setError(e.message)
    } finally {
      setLoading(false)
    }
  }, [headers])

  useEffect(() => {
    fetchAll()
    const interval = setInterval(fetchAll, pollMs)
    return () => clearInterval(interval)
  }, [fetchAll, pollMs])

  const reset = useCallback(async (type, valueHash) => {
    await fetch(`/admin/identifier/${type}/${valueHash}`, {
      method: 'DELETE',
      headers: headers()
    })
    fetchAll()
  }, [headers, fetchAll])

  return { identifiers, load, error, loading, refresh: fetchAll, reset }
}

// ─── component: LoadBar ────────────────────────────────────────────────────
function LoadBar({ load }) {
  if (!load) return null
  const pct = Math.round(load.cpuPercent ?? 0)
  const factor = load.currentFactor ?? 1
  const color = factor >= 0.8 ? 'bg-emerald-400' : factor >= 0.5 ? 'bg-amber-400' : 'bg-rose-400'

  return (
    <div className="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-6 shadow-sm">
      <div className="flex-1">
        <div className="flex justify-between text-xs text-slate-500 mb-1">
          <span>CPU usage</span>
          <span>{pct}%</span>
        </div>
        <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
          <div className={`h-full rounded-full transition-all ${color}`} style={{ width: `${pct}%` }} />
        </div>
      </div>
      <div className="text-right">
        <div className="text-xs text-slate-500">Load factor</div>
        <div className={`text-lg font-semibold ${factor >= 0.8 ? 'text-emerald-600' : factor >= 0.5 ? 'text-amber-600' : 'text-rose-600'}`}>
          {factor.toFixed(2)}×
        </div>
      </div>
      <div className="text-right">
        <div className="text-xs text-slate-500">Adaptive</div>
        <div className={`text-sm font-medium ${load.enabled ? 'text-emerald-600' : 'text-slate-400'}`}>
          {load.enabled ? 'on' : 'off'}
        </div>
      </div>
    </div>
  )
}

// ─── component: IdentifierTable ────────────────────────────────────────────
const SORT_KEYS = ['type', 'currentCount', 'penaltyMultiplier']

function IdentifierTable({ identifiers, onReset }) {
  const [sortKey, setSortKey] = useState('currentCount')
  const [sortDir, setSortDir] = useState(-1) // -1 = desc
  const [filter, setFilter] = useState('')

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d * -1)
    else { setSortKey(key); setSortDir(-1) }
  }

  const arrow = (key) => sortKey === key ? (sortDir === -1 ? ' ↓' : ' ↑') : ''

  const rows = identifiers
    .filter(id => !filter || id.type.includes(filter) || id.valueHash.includes(filter))
    .slice()
    .sort((a, b) => {
      const av = a[sortKey] ?? 0
      const bv = b[sortKey] ?? 0
      return typeof av === 'string' ? sortDir * av.localeCompare(bv) : sortDir * (av - bv)
    })

  if (identifiers.length === 0) {
    return (
      <div className="bg-white border border-slate-200 rounded-xl p-10 text-center text-slate-400 shadow-sm">
        No active identifiers yet. Make some requests to your protected app.
      </div>
    )
  }

  return (
    <div className="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden">
      <div className="p-4 border-b border-slate-100 flex items-center gap-3">
        <input
          className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm w-64 focus:outline-none focus:ring-2 focus:ring-blue-300"
          placeholder="Filter by type or hash…"
          value={filter}
          onChange={e => setFilter(e.target.value)}
        />
        <span className="text-xs text-slate-400 ml-auto">{rows.length} identifier{rows.length !== 1 ? 's' : ''}</span>
      </div>
      <div className="overflow-x-auto">
        <table className="w-full text-sm">
          <thead>
            <tr className="text-left text-xs text-slate-500 bg-slate-50 border-b border-slate-100">
              <th className="px-4 py-3 font-medium" data-sort onClick={() => toggleSort('type')}>
                Type{arrow('type')}
              </th>
              <th className="px-4 py-3 font-medium">Hash</th>
              <th className="px-4 py-3 font-medium text-right" data-sort onClick={() => toggleSort('currentCount')}>
                Count{arrow('currentCount')}
              </th>
              <th className="px-4 py-3 font-medium text-right" data-sort onClick={() => toggleSort('penaltyMultiplier')}>
                Penalty{arrow('penaltyMultiplier')}
              </th>
              <th className="px-4 py-3"></th>
            </tr>
          </thead>
          <tbody>
            {rows.map((id, i) => (
              <tr key={id.type + ':' + id.valueHash} className={`border-b border-slate-50 ${i % 2 === 0 ? '' : 'bg-slate-50/40'} hover:bg-blue-50/40 transition-colors`}>
                <td className="px-4 py-3">
                  <span className="inline-block bg-blue-100 text-blue-700 text-xs font-medium px-2 py-0.5 rounded-full">
                    {id.type}
                  </span>
                </td>
                <td className="px-4 py-3 font-mono text-slate-400 text-xs truncate max-w-[160px]">
                  {id.valueHash}
                </td>
                <td className="px-4 py-3 text-right font-semibold tabular-nums">
                  {id.currentCount}
                </td>
                <td className="px-4 py-3 text-right">
                  <PenaltyBadge value={id.penaltyMultiplier} />
                </td>
                <td className="px-4 py-3 text-right">
                  <button
                    onClick={() => onReset(id.type, id.valueHash)}
                    className="text-xs text-rose-500 hover:text-rose-700 border border-rose-200 hover:border-rose-400 px-2 py-1 rounded-lg transition-colors"
                  >
                    Reset
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  )
}

function PenaltyBadge({ value }) {
  if (!value || value <= 1) return <span className="text-slate-400">—</span>
  const color = value >= 3 ? 'text-rose-600 bg-rose-50 border-rose-200' : 'text-amber-600 bg-amber-50 border-amber-200'
  return (
    <span className={`inline-block border text-xs font-semibold px-2 py-0.5 rounded-full ${color}`}>
      ×{value.toFixed(1)}
    </span>
  )
}

// ─── component: App ────────────────────────────────────────────────────────
function App() {
  const [token, setToken] = useState(() => localStorage.getItem('adminToken') ?? 'dev-token-change-in-production')
  const [inputToken, setInputToken] = useState(token)
  const { identifiers, load, error, loading, refresh, reset } = useAdminData(token)

  const applyToken = () => {
    localStorage.setItem('adminToken', inputToken)
    setToken(inputToken)
  }

  return (
    <div className="max-w-5xl mx-auto px-4 py-8 space-y-6">
      {/* Header */}
      <div className="flex items-start justify-between gap-4 flex-wrap">
        <div>
          <h1 className="text-2xl font-bold text-slate-900">Rate Limit Admin</h1>
          <p className="text-sm text-slate-500 mt-0.5">Live state · refreshes every 5 s</p>
        </div>
        <div className="flex items-center gap-2">
          <input
            type="password"
            value={inputToken}
            onChange={e => setInputToken(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && applyToken()}
            placeholder="Bearer token"
            className="border border-slate-200 rounded-lg px-3 py-1.5 text-sm w-56 focus:outline-none focus:ring-2 focus:ring-blue-300"
          />
          <button
            onClick={applyToken}
            className="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-1.5 rounded-lg transition-colors"
          >
            Connect
          </button>
          <button
            onClick={refresh}
            className="border border-slate-200 hover:border-slate-300 text-slate-500 text-sm px-3 py-1.5 rounded-lg transition-colors"
            title="Refresh now"
          >
            ↻
          </button>
        </div>
      </div>

      {/* Error */}
      {error && (
        <div className="bg-rose-50 border border-rose-200 text-rose-700 rounded-xl px-4 py-3 text-sm">
          {error}
        </div>
      )}

      {/* Load bar */}
      <LoadBar load={load} />

      {/* Table */}
      {loading ? (
        <div className="text-center py-12 text-slate-400 text-sm">Loading…</div>
      ) : (
        <IdentifierTable identifiers={identifiers} onReset={reset} />
      )}

      <p className="text-xs text-center text-slate-300">
        Example-grade auth — not for production use
      </p>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />)
</script>
</body>
</html>
